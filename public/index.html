<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloud Multimedia Gallery (CW2)</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <header>
    <h1>My Cloud Gallery</h1>
    <button id="btnRefresh">View Gallery</button>
  </header>

  <main>
    <section class="panel">
      <h2>Upload New Image</h2>

      <label for="title">Title</label>
      <input id="title" type="text" placeholder="Enter image title">

      <label for="file">Choose image</label>
      <input id="file" type="file" accept="image/*">

      <button id="btnUpload">Upload to Cloud</button>
      <p id="status"></p>
    </section>

    <section class="panel">
      <h2>Gallery</h2>
      <div id="gallery" class="grid"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
